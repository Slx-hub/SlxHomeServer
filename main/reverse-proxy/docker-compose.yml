services:
  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - main-network
    depends_on:
      - auth

  auth:
    build: ../auth
    restart: unless-stopped
    stop_grace_period: 2s
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:-changeme}
    networks:
      - main-network
    expose:
      - "49999"

volumes:
  caddy_data:
  caddy_config:

networks:
  main-network:
    driver: bridge
    name: main-network
