### SlxHomeServer – Debian Preseed (unattended install)
### Targets: Debian 12+ netinst, amd64

# ── Locale & keyboard ───────────────────────────────────────────────────
d-i debian-installer/locale                 string  en_US.UTF-8
d-i keyboard-configuration/xkb-keymap      select  us
d-i console-setup/ask_detect                boolean false

# ── Network ──────────────────────────────────────────────────────────────
# Try DHCP on any available interface first; Wi-Fi is configured post-install
d-i netcfg/choose_interface                 select  auto
d-i netcfg/get_hostname                     string  slxhomeserver
d-i netcfg/get_domain                       string  local

# ── Mirror ───────────────────────────────────────────────────────────────
d-i mirror/country                          string  manual
d-i mirror/http/hostname                    string  deb.debian.org
d-i mirror/http/directory                   string  /debian
d-i mirror/http/proxy                       string

# ── Clock / timezone ─────────────────────────────────────────────────────
d-i clock-setup/utc                         boolean true
d-i time/zone                               string  UTC
d-i clock-setup/ntp                         boolean true

# ── Partitioning – WIPE entire main disk and install Debian ─────────────
# The installer targets the first available non-removable disk.
# SATA/SSD:  typically /dev/sda
# NVMe:      typically /dev/nvme0n1
# Override here if your hardware uses a different device name.
d-i partman-auto/disk                       string  /dev/nvme0n1 /dev/sda
d-i partman-auto/method                     string  regular
d-i partman-auto/choose_recipe              select  atomic
d-i partman-partitioning/confirm_write_new_label  boolean true
d-i partman/choose_partition                select  finish
d-i partman/confirm                         boolean true
d-i partman/confirm_nooverwrite             boolean true

# ── User account ─────────────────────────────────────────────────────────
# No root login; create user "slx" with sudo
d-i passwd/root-login                       boolean false
d-i passwd/user-fullname                    string  slx
d-i passwd/username                         string  slx
# Temporary password – SSH key auth is enforced; password login disabled
d-i passwd/user-password                    password slxsetup
d-i passwd/user-password-again              password slxsetup
d-i user-setup/allow-password-login         boolean true

# ── Package selection ────────────────────────────────────────────────────
tasksel tasksel/first                       multiselect ssh-server, standard
d-i pkgsel/include                          string  sudo openssh-server git wpasupplicant
d-i pkgsel/upgrade                          select  full-upgrade
popularity-contest popularity-contest/participate  boolean false

# ── Boot loader ──────────────────────────────────────────────────────────
d-i grub-installer/only_debian              boolean true
d-i grub-installer/bootdev                  string  default

# ── Finish ───────────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress       note

# ── Late command – runs at the end of install inside the target system ───
d-i preseed/late_command string \
    cp /cdrom/authorized_keys /target/tmp/authorized_keys; \
    cp /cdrom/wifi.conf       /target/tmp/wifi.conf; \
    cp /cdrom/late-install.sh /target/tmp/late-install.sh; \
    in-target chmod +x /tmp/late-install.sh; \
    in-target /bin/bash /tmp/late-install.sh
