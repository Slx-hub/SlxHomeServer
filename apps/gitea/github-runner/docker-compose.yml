name: github-actions-runner

services:
  runner:
    build:
      context: .
    env_file:
      - ../../../.env
    environment:
      RUNNER_NAME: ${RUNNER_NAME:-github-runner}
      RUNNER_LABELS: ${RUNNER_LABELS:-self-hosted,linux}
    volumes:
      # Persistent registration state (survives container restarts)
      - runner-data:/data
      # Docker socket for running containers in workflows
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - main-network

networks:
  main-network:
    external: true
    name: main-network

volumes:
  runner-data:
