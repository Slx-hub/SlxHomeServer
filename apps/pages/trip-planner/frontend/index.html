<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        // Set <base> dynamically so relative asset/API URLs work both when
        // proxied under /trips and on direct :50004 access. (Same trick as the
        // container-manager page.)
        const p = window.location.pathname;
        const base = p.includes('/trips') ? '/trips/' : '/';
        document.write(`<base href="${base}">`);
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <title>Trip Planner — SlxHomeServer</title>
</head>
<body>
    <div id="map"></div>

    <!-- Top-left: trip switcher + expandable filters, one panel -->
    <div class="ui ui-topleft panel">
        <div class="topleft-row">
            <span class="brand">🗺️</span>
            <div class="trip-select-wrap">
                <select id="trip-select" aria-label="Select trip"></select>
                <div id="trip-title" class="trip-title">Loading…</div>
            </div>
            <button id="btn-fit" class="icon-btn" title="Fit all pins">⤢</button>
            <button id="filter-toggle" class="icon-btn" title="Filters"
                    aria-controls="filter-panel" aria-expanded="false">☰</button>
        </div>
        <div id="filter-panel" class="filter-panel" hidden>
            <div id="filter-panel-body"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
