services:
  trip-planner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Run as slx (1000:1000) so JSON files written by the container and by the
    # plan-trip skill (which runs locally as slx) share ownership cleanly.
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:50004/api/healthz', timeout=3).getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - "50004:50004"
    volumes:
      # Per-trip JSON files. The plan-trip skill writes here too.
      - /data/trip-planner:/app/data
      # Rolling daily assistant transcript, kept next to the app (git-ignored).
      - ./logs:/app/logs
    environment:
      DATA_DIR: /app/data
      DEFAULT_TRIP: japan
      # Chat assistant (Gemini). Put the key in a .env file next to this
      # compose file (see .env.example); the chat panel stays hidden if unset.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      # Optional Google Places key for accurate venue-name geocoding (see
      # .env.example). Blank → keyless Nominatim/Photon fallback.
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      CHAT_DAILY_LIMIT: ${CHAT_DAILY_LIMIT:-1500}
      # Rolling daily transcript of every chat turn (send/receive + thinking +
      # tool calls), written to ./logs/chat.log via the bind mount above.
      # CHAT_LOG_LEVEL=DEBUG additionally logs the full system+context we send.
      CHAT_LOG_LEVEL: ${CHAT_LOG_LEVEL:-INFO}
      CHAT_LOG_KEEP_DAYS: ${CHAT_LOG_KEEP_DAYS:-5}
    networks:
      - main-network

networks:
  main-network:
    external: true
    name: main-network
