services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8090/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "8090:8090"
    volumes:
      - beszel_data:/beszel_data
    # Lets the hub reach the agent on the host via host.docker.internal:45876
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - main-network

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/docker.sock"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Host networking gives the agent direct access to host CPU/mem/disk/network
    # metrics and lets the hub reach it at host.docker.internal:45876
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - ../../../.env
    environment:
      PORT: "45876"
      KEY: "${BESZEL_AGENT_KEY}"
      TOKEN: "${BESZEL_AGENT_TOKEN}"
      HUB_URL: "http://localhost:8090"

volumes:
  beszel_data:

networks:
  main-network:
    external: true
    name: main-network
