services:
  secret-page:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "50002:50002"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - main-network

networks:
  main-network:
    external: true
