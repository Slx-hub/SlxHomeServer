services:
  container-manager:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:50001/api/healthz', timeout=3).getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "50001:50001"
    volumes:
      # Mount Docker socket so we can manage containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the project root at its real path so docker compose paths resolve correctly
      - /home/slx/SlxHomeServer:/home/slx/SlxHomeServer:ro
      # Persist favorites across rebuilds
      - /data/container-manager:/app/data
    environment:
      PROJECT_ROOT: /home/slx/SlxHomeServer
    networks:
      - main-network

networks:
  main-network:
    external: true
    name: main-network
