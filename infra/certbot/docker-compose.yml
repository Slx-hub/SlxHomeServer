services:
  certbot:
    build: .
    container_name: certbot-renewer
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "certbot --version >/dev/null 2>&1 || exit 1"]
      interval: 6h
      timeout: 20s
      retries: 2
      start_period: 30s
    volumes:
      # Certbot's working directory
      - certbot_data:/etc/letsencrypt
      # Mount post-renewal hook for copying certs and restarting reverse-proxy
      - ./post-renewal.sh:/etc/letsencrypt/renewal-hooks/post/restart-and-copy.sh:ro
      # Local bind mount to reverse-proxy certs directory
      - /home/slx/SlxHomeServer/platform/reverse-proxy/certs/certbot:/mnt/certs
      # Mount docker socket for restarting reverse-proxy after renewal
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../../.env
    networks:
      - main-network
    # Entrypoint script handles initial cert generation and renewal loop
    # Caddy proxies ACME challenges to port 8080 during generation and renewal

volumes:
  certbot_data:

networks:
  main-network:
    external: true
    name: main-network
