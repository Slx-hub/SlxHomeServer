services:
  porkbun-ddns:
    build: .
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORKBUN_CONFIG: config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - porkbun_logs:/var/log/porkbun-ddns
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  porkbun_logs:
