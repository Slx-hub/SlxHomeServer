services:
  porkbun-ddns:
    build: .
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if os.path.isfile('/app/config.yaml') and os.path.getsize('/app/config.yaml') > 0 else 1)"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 20s
    env_file:
      - ../../.env
    environment:
      PORKBUN_CONFIG: config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - porkbun_logs:/var/log/porkbun-ddns
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  porkbun_logs:
