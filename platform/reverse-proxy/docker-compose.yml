services:
  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - main-network
    depends_on:
      - auth

  auth:
    build: ../auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:49999/healthz', timeout=3).getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    stop_grace_period: 2s
    env_file:
      - ../../.env
    networks:
      - main-network
    expose:
      - "49999"

volumes:
  caddy_data:
  caddy_config:

networks:
  main-network:
    driver: bridge
    name: main-network
